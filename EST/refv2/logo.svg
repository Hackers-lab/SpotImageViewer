<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="240" r="170" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.2"/>
  <!-- Lightning bolt -->
  <polygon points="280,80 180,260 240,260 220,420 340,210 270,210" fill="url(#bolt)" stroke="#e67e22" stroke-width="4" stroke-linejoin="round"/>
  <!-- Pole left -->
  <rect x="110" y="160" width="10" height="200" rx="3" fill="#ecf0f1" opacity="0.8"/>
  <rect x="95" y="170" width="40" height="6" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <rect x="95" y="200" width="40" height="6" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <!-- Pole right -->
  <rect x="392" y="160" width="10" height="200" rx="3" fill="#ecf0f1" opacity="0.8"/>
  <rect x="377" y="170" width="40" height="6" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <rect x="377" y="200" width="40" height="6" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <!-- Wires connecting poles -->
  <path d="M135,173 Q256,155 392,173" fill="none" stroke="#ecf0f1" stroke-width="3" opacity="0.5"/>
  <path d="M135,203 Q256,185 392,203" fill="none" stroke="#ecf0f1" stroke-width="3" opacity="0.5"/>
  <!-- Text ERP EST -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="56" font-weight="bold" fill="#ecf0f1" letter-spacing="8">ERP EST</text>
</svg>
